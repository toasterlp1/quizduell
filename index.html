<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz Duell</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg-0:#0a0e17;--bg-1:#111726;--bg-2:#1a2236;
  --steel-1:#1e3a8a;--steel-2:#2b5bd4;--steel-glow:#3b82f6;
  --bolt:#e01e2b;--bolt-2:#ff3b46;--gold:#f5b942;
  --ink:#eef2fb;--ink-dim:#8a97b4;--line:rgba(120,140,190,.16);
  --radius:14px;--shadow:0 10px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:
    radial-gradient(1200px 700px at 50% -10%, rgba(43,91,212,.18), transparent 60%),
    radial-gradient(900px 500px at 90% 110%, rgba(224,30,43,.10), transparent 60%),
    var(--bg-0);
  color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
.display-font{font-family:'Oswald',sans-serif;letter-spacing:.5px}
#gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg-0)}
.gate-card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius);padding:36px;max-width:440px;width:92%;box-shadow:var(--shadow);text-align:center}
.gate-card h1{font-family:'Oswald';font-size:34px;font-weight:700;margin-bottom:6px}
.gate-card .bolt{color:var(--bolt)}
.gate-card p{color:var(--ink-dim);font-size:14px;margin-bottom:22px;line-height:1.5}
.gate-roles{display:grid;gap:10px}
.gate-roles a{display:block;text-decoration:none;padding:14px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line);color:var(--ink);font-weight:600;transition:.15s}
.gate-roles a:hover{border-color:var(--steel-glow);transform:translateY(-1px)}
.gate-roles a small{display:block;color:var(--ink-dim);font-weight:400;font-size:12px;margin-top:3px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(26,34,54,.6),transparent);flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:12px;font-family:'Oswald';font-weight:700;font-size:26px}
.logo .mark{width:38px;height:38px;display:grid;place-items:center;border-radius:9px;background:linear-gradient(135deg,var(--bolt),var(--bolt-2));box-shadow:0 0 22px rgba(224,30,43,.5);font-size:20px}
.topright{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.turn-pill{display:flex;align-items:center;gap:10px;padding:9px 18px;border-radius:999px;background:linear-gradient(90deg,rgba(224,30,43,.15),rgba(43,91,212,.15));border:1px solid var(--line);font-family:'Oswald';font-weight:600;font-size:18px}
.turn-pill .star{color:var(--gold)}
.turn-name{color:var(--gold)}
.round-tag{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--ink-dim);padding:6px 12px;border:1px solid var(--line);border-radius:999px}
.board-wrap{padding:22px;max-width:1500px;margin:0 auto}
.board{display:grid;gap:12px;grid-template-columns:repeat(var(--cols,6),1fr)}
.cat-head{background:linear-gradient(180deg,var(--bolt),#a3121c);border-radius:12px;padding:18px 10px;text-align:center;font-family:'Oswald';font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.5px;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.18);min-height:64px;display:grid;place-items:center}
.cell{background:linear-gradient(180deg,var(--steel-2),var(--steel-1));border:none;border-radius:12px;padding:24px 10px;cursor:pointer;font-family:'Oswald';font-weight:700;font-size:30px;font-style:italic;color:#dce7ff;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),var(--shadow);transition:.15s;text-align:center}
.cell:hover:not(.used){transform:translateY(-2px);box-shadow:0 0 24px rgba(59,130,246,.45)}
.cell.used{background:var(--bg-1);color:#2c3650;cursor:default;box-shadow:none;border:1px solid var(--line)}
.cell:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.scorebar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:16px 22px 28px}
.player{position:relative;background:var(--bg-1);border:1px solid var(--line);border-radius:12px;padding:12px 18px;min-width:150px;text-align:center;transition:.2s}
.player.active{border-color:var(--gold);box-shadow:0 0 18px rgba(245,185,66,.3)}
.player.buzzed{border-color:var(--bolt-2);box-shadow:0 0 22px rgba(255,59,70,.55);animation:buzzpulse .8s ease infinite}
@keyframes buzzpulse{50%{box-shadow:0 0 34px rgba(255,59,70,.85)}}
.player .pname{font-family:'Oswald';font-weight:600;font-size:16px;color:var(--ink);text-transform:uppercase;letter-spacing:.4px}
.player .pscore{font-family:'Oswald';font-weight:700;font-size:26px;color:var(--gold);margin-top:2px}
.player .ctrls{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.player .ctrls button{border:1px solid var(--line);background:var(--bg-2);color:var(--ink);border-radius:7px;min-width:30px;height:28px;cursor:pointer;font-weight:700;font-size:13px;padding:0 6px}
.player .ctrls button:hover{border-color:var(--steel-glow)}
.player .buzz-rank{position:absolute;top:-10px;left:-10px;width:26px;height:26px;border-radius:50%;background:var(--bolt);color:#fff;font-family:'Oswald';font-weight:700;display:grid;place-items:center;font-size:14px;box-shadow:0 0 14px rgba(224,30,43,.7)}
.player.empty{opacity:.4;border-style:dashed}
.overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(5,8,14,.86);backdrop-filter:blur(6px);padding:24px}
.overlay.open{display:flex}
.qcard{background:linear-gradient(180deg,var(--bg-2),var(--bg-1));border:1px solid var(--line);border-radius:20px;padding:40px;max-width:880px;width:100%;box-shadow:var(--shadow);text-align:center;position:relative;max-height:92vh;overflow-y:auto}
.qcat{font-family:'Oswald';color:var(--bolt-2);text-transform:uppercase;letter-spacing:1px;font-size:15px;font-weight:600}
.qval{font-family:'Oswald';color:var(--gold);font-size:18px;font-weight:700;margin-top:2px}
.qflag{margin:14px 0}
.qflag img{width:260px;max-width:80%;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.5);border:1px solid var(--line)}
.qtext{font-size:30px;font-weight:600;line-height:1.35;margin:22px 0;font-family:'Oswald'}
.qanswer{margin:20px auto;max-width:640px;padding:18px;border-radius:12px;background:rgba(245,185,66,.08);border:1px dashed rgba(245,185,66,.4);font-size:22px;color:var(--gold);font-weight:600;display:none;font-family:'Oswald'}
.qanswer.show{display:block}
.phase-label{margin:10px 0;font-family:'Oswald';font-size:16px;font-weight:600;color:var(--ink-dim)}
.phase-label .main{color:var(--gold)}
.phase-label .steal{color:var(--bolt-2)}
.buzz-status{margin:12px 0;min-height:26px;font-family:'Oswald';font-size:20px;font-weight:600}
.buzz-status .who{color:var(--bolt-2)}
.qbtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px}
.btn{font-family:'Inter';font-weight:600;font-size:15px;padding:12px 22px;border-radius:10px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink);cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--steel-glow);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-reveal{border-color:rgba(245,185,66,.5);color:var(--gold)}
.btn-correct{background:linear-gradient(135deg,#16a34a,#15803d);border:none;color:#fff}
.btn-wrong{background:linear-gradient(135deg,#b91c1c,#7f1d1d);border:none;color:#fff}
.btn-close{background:transparent}
.hint{color:var(--ink-dim);font-size:12px;margin-top:8px;line-height:1.5}
.who-now{margin:6px 0 2px;font-family:'Oswald';font-size:24px;font-weight:700}
.who-now b{color:var(--gold)}
.buzz-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:22px;text-align:center}
.buzz-name-setup{width:100%;max-width:360px}
.buzz-name-setup input{width:100%;padding:16px;border-radius:12px;border:1px solid var(--line);background:var(--bg-1);color:var(--ink);font-size:18px;text-align:center;margin-bottom:12px}
.buzz-btn{width:min(78vw,340px);height:min(78vw,340px);border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 38% 32%,var(--bolt-2),var(--bolt) 55%,#7f0f17);color:#fff;font-family:'Oswald';font-weight:700;font-size:48px;letter-spacing:2px;box-shadow:0 0 0 10px rgba(224,30,43,.15),0 18px 50px rgba(224,30,43,.45),inset 0 6px 20px rgba(255,255,255,.25);transition:.08s;touch-action:manipulation}
.buzz-btn:active{transform:scale(.95)}
.buzz-btn:disabled{background:var(--bg-2);color:#46506b;box-shadow:none;cursor:not-allowed}
.buzz-meta{font-family:'Oswald';font-size:20px;color:var(--ink-dim)}
.buzz-meta b{color:var(--gold)}
.buzz-locked{color:var(--bolt-2);font-weight:700}
.buzz-first{color:#16a34a;font-weight:700;font-size:26px}
.buzz-question{background:var(--bg-1);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:520px;width:100%;font-family:'Oswald';font-size:22px;font-weight:600;line-height:1.35}
.buzz-question .bqcat{color:var(--bolt-2);font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.buzz-question .bqflag{margin:8px 0}
.buzz-question .bqflag img{width:200px;max-width:80%;border-radius:8px;border:1px solid var(--line)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:12px 20px;font-weight:600;z-index:200;transition:.3s;box-shadow:var(--shadow)}
#toast.show{transform:translateX(-50%) translateY(0)}
.toolbtn{background:var(--bg-2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 14px;cursor:pointer;font-weight:600;font-size:13px}
.toolbtn:hover{border-color:var(--steel-glow)}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(460px,94vw);z-index:60;background:var(--bg-1);border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(100%);transition:.25s;overflow-y:auto;padding:22px}
.drawer.open{transform:translateX(0)}
.drawer h2{font-family:'Oswald';font-size:22px;margin-bottom:4px}
.drawer .sub{color:var(--ink-dim);font-size:13px;margin-bottom:18px}
.drawer label{display:block;font-size:13px;color:var(--ink-dim);margin:14px 0 5px;font-weight:600}
.drawer input,.drawer textarea,.drawer select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink);font-family:inherit;font-size:14px}
.drawer textarea{min-height:60px;resize:vertical}
.drawer .closeX{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--ink-dim);font-size:24px;cursor:pointer}
.q-edit{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.q-edit .qhead{display:flex;justify-content:space-between;font-family:'Oswald';font-size:13px;color:var(--gold);margin-bottom:6px}
.order-row{display:flex;align-items:center;gap:6px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:6px}
.order-row .nm{flex:1;font-weight:600}
.order-row button{border:1px solid var(--line);background:var(--bg-1);color:var(--ink);border-radius:6px;width:30px;height:28px;cursor:pointer}
@media (max-width:760px){.board{gap:6px}.cell{font-size:20px;padding:14px 4px}.cat-head{font-size:10px;padding:10px 4px;min-height:48px}.topbar{flex-direction:column}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <h1>QUIZ<span class="bolt">/</span>DUELL</h1>
    <div class="gate-roles">
      <a href="?view=host">Host / Spielleitung</a>
      <a href="?view=buzz">Buzzer</a>
    </div>
  </div>
</div>
<div id="boardView" style="display:none">
  <div class="topbar">
    <div class="logo">QUIZ<span style="color:var(--bolt);margin:0 2px">/</span>DUELL</div>
    <div class="topright">
      <span class="round-tag" id="roundTag">Runde 1</span>
      <div class="turn-pill"><span class="star">★</span> <span>Am Zug:</span> <span class="turn-name" id="turnName">—</span> <span class="star">★</span></div>
      <button class="toolbtn" id="nextRoundBtn">Runde 2 ▶</button>
      <button class="toolbtn" id="openSettings">⚙️</button>
    </div>
  </div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
  <div class="scorebar" id="scorebar"></div>
</div>
<div id="buzzView" class="buzz-screen" style="display:none">
  <div class="logo" style="font-size:30px">QUIZ<span style="color:var(--bolt);margin:0 2px">/</span>DUELL</div>
  <div id="buzzSetup" class="buzz-name-setup">
    <label style="color:var(--ink-dim);font-size:14px;display:block;margin-bottom:8px">Gib deinen Namen ein</label>
    <input id="buzzNameInput" maxlength="16" placeholder="Dein Name" autocomplete="off"/>
    <button class="btn btn-correct" id="buzzJoin" style="width:100%">Beitreten</button>
    <div class="hint">Dein Name erscheint beim Host auf dem Board.</div>
  </div>
  <div id="buzzPlay" style="display:none;flex-direction:column;align-items:center;gap:20px">
    <div class="buzz-meta">Du: <b id="buzzMyName">—</b></div>
    <div class="buzz-question" id="buzzQuestion" style="display:none"></div>
    <button class="buzz-btn" id="buzzBtn">BUZZ</button>
    <div class="buzz-meta" id="buzzInfo">Warte auf den Host…</div>
    <button class="btn btn-close" id="buzzChange" style="margin-top:4px">Name ändern</button>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="qcard">
    <div class="qcat" id="ovCat">KATEGORIE</div>
    <div class="qval" id="ovVal">100</div>
    <div class="qflag" id="ovFlag" style="display:none"></div>
    <div class="qtext" id="ovText">Frage…</div>
    <div class="phase-label" id="ovPhase"></div>
    <div class="who-now" id="ovWhoNow"></div>
    <div class="buzz-status" id="ovBuzz"></div>
    <div class="qanswer" id="ovAnswer"></div>
    <div id="hostControls">
      <div class="qbtns">
        <button class="btn btn-reveal" id="btnReveal">Antwort aufdecken</button>
        <button class="btn btn-correct" id="btnCorrect">✓ Richtig</button>
        <button class="btn btn-wrong" id="btnWrong">✗ Falsch</button>
      </div>
      <div class="qbtns">
        <button class="btn" id="btnOpenBuzz">Buzzer freigeben (Steal)</button>
        <button class="btn btn-close" id="btnClose">Frage schliessen → nächster Spieler</button>
      </div>
      <div class="hint" id="ovHint"></div>
    </div>
  </div>
</div>
<div class="drawer" id="drawer">
  <button class="closeX" id="closeDrawer">×</button>
  <h2>Einstellungen</h2>
  <div class="sub">Reihenfolge & Fragen.</div>
  <h2 style="font-size:17px">Spieler-Reihenfolge</h2>
  <div id="orderEditor"></div>
  <h2 style="font-size:17px;margin-top:24px">Fragen bearbeiten</h2>
  <label>Runde</label>
  <select id="roundSelect"><option value="round1">Runde 1</option><option value="round2">Runde 2 (doppelt)</option></select>
  <label>Kategorie</label>
  <select id="catSelect"></select>
  <div id="questionEditor" style="margin-top:12px"></div>
  <h2 style="font-size:17px;margin-top:24px">Spiel</h2>
  <button class="btn" id="resetBoard" style="margin-top:8px;width:100%">Board zurücksetzen (Felder offen)</button>
  <button class="btn btn-wrong" id="resetScores" style="margin-top:8px;width:100%">Punkte auf 0</button>
  <button class="btn btn-wrong" id="kickAll" style="margin-top:8px;width:100%">Alle Spieler entfernen</button>
</div>
<div id="toast"></div>
<script>

function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function ckey(cat,qi){return cat+"|"+qi;}
function flagUrl(cc){return FLAG_IMG[String(cc).toLowerCase()]||"";}

async function loadState(){
  if(usingSupabase){
    const {data}=await sb.from("quiz_state").select("data").eq("id",GAME_ID).maybeSingle();
    if(data&&data.data){state=data.data;fixState();return;}
    fixState();await saveState();
  }else{
    const raw=localStorage.getItem("quizduell2_"+GAME_ID);
    if(raw)state=JSON.parse(raw);
    fixState();
  }
}
function fixState(){
  if(!state.used)state.used={round1:{},round2:{}};
  if(!state.used.round1)state.used.round1={};
  if(!state.used.round2)state.used.round2={};
  if(!state.players)state.players=[];
  if(!state.order)state.order=[];
  if(typeof state.turnIndex!=="number")state.turnIndex=0;
  if(!state.buzz)state.buzz={phase:"main",open:false,order:[],graded:[]};
  if(!state.buzz.graded)state.buzz.graded=[];
  if(!state.round)state.round="round1";
  state.order=state.order.filter(id=>state.players.some(p=>p.id===id));
  state.players.forEach(p=>{if(!state.order.includes(p.id))state.order.push(p.id);});
  if(state.turnIndex>=state.order.length)state.turnIndex=0;
}
let saveTimer=null;
async function saveState(){
  if(usingSupabase){const {error}=await sb.from("quiz_state").upsert({id:GAME_ID,data:state});if(error)console.warn("save",error);}
  else localStorage.setItem("quizduell2_"+GAME_ID,JSON.stringify(state));
}
function commit(){renderAll();clearTimeout(saveTimer);saveTimer=setTimeout(saveState,120);}

function subscribeRealtime(){
  if(!usingSupabase)return;
  sb.channel("quiz_"+GAME_ID)
    .on("postgres_changes",{event:"*",schema:"public",table:"quiz_state",filter:"id=eq."+GAME_ID},
      p=>{if(p.new&&p.new.data){state=p.new.data;fixState();renderAll();}})
    .subscribe();
}

function roundData(){return QUIZ_CONTENT[state.round];}
function turnPlayer(){const id=state.order[state.turnIndex];return state.players.find(p=>p.id===id)||null;}
function advanceTurn(){if(state.order.length)state.turnIndex=(state.turnIndex+1)%state.order.length;}

function renderAll(){
  if(VIEW==="buzz"){renderBuzz();return;}
  renderTop();renderBoard();renderScores();
  if($("#overlay").classList.contains("open"))renderOverlay();
}
function renderTop(){
  $("#roundTag").textContent=roundData().label;
  const p=turnPlayer();
  $("#turnName").textContent=p?p.name.toUpperCase():"—";
  $("#nextRoundBtn").textContent=state.round==="round1"?"Runde 2 ▶":"◀ Runde 1";
}
function renderBoard(){
  const rd=roundData(),board=$("#board");
  board.style.setProperty("--cols",rd.categories.length);board.innerHTML="";
  rd.categories.forEach(c=>{const h=document.createElement("div");h.className="cat-head display-font";h.textContent=c.name;board.appendChild(h);});
  rd.values.forEach((val,qi)=>{
    rd.categories.forEach(c=>{
      const k=ckey(c.name,qi),isUsed=state.used[state.round][k];
      const cell=document.createElement("button");
      cell.className="cell display-font"+(isUsed?" used":"");
      cell.textContent=val;
      if(isUsed)cell.disabled=true;else cell.onclick=()=>openQuestion(c.name,qi);
      board.appendChild(cell);
    });
  });
}
function renderScores(){
  const bar=$("#scorebar");bar.innerHTML="";
  if(!state.order.length){bar.innerHTML='<div class="player empty"><div class="pname">Noch keine Spieler</div><div class="hint"></div></div>';return;}
  state.order.forEach((pid,idx)=>{
    const p=state.players.find(x=>x.id===pid);if(!p)return;
    let cls="player";
    if(idx===state.turnIndex)cls+=" active";
    const rank=state.buzz.order.indexOf(pid);
    if(rank>-1&&state.buzz.phase==="steal")cls+=" buzzed";
    const div=document.createElement("div");div.className=cls;
    div.innerHTML=(rank>-1&&state.buzz.phase==="steal"?`<div class="buzz-rank">${rank+1}</div>`:"")+
      `<div class="pname">${esc(p.name)}</div><div class="pscore">${p.score}</div>`;
    const ctr=document.createElement("div");ctr.className="ctrls";
    ctr.innerHTML=`<button data-d="-100">−100</button><button data-d="100">+100</button><button data-turn title="dran setzen">★</button>`;
    ctr.querySelectorAll("[data-d]").forEach(b=>b.onclick=()=>{p.score+=+b.dataset.d;commit();});
    ctr.querySelector("[data-turn]").onclick=()=>{state.turnIndex=idx;commit();};
    div.appendChild(ctr);bar.appendChild(div);
  });
}

let revealed=false;
function getQ(){if(!state.open)return null;const rd=QUIZ_CONTENT[state.open.round];const cat=rd.categories.find(c=>c.name===state.open.cat);return cat?cat.q[state.open.qi]:null;}
function curVal(){if(!state.open)return 0;return QUIZ_CONTENT[state.open.round].values[state.open.qi];}

function openQuestion(cat,qi){
  if(!state.order.length){toast("Erst müssen Spieler beitreten.");return;}
  state.open={round:state.round,cat,qi};
  state.buzz={phase:"main",open:false,order:[],graded:[]};
  revealed=false;commit();
  $("#ovAnswer").classList.remove("show");
  renderOverlay();$("#overlay").classList.add("open");
}
function renderOverlay(){
  if(!state.open)return;
  const q=getQ(),val=curVal();
  $("#ovCat").textContent=state.open.cat;
  $("#ovVal").textContent=val+" Punkte";
  const flagEl=$("#ovFlag");
  if(q&&q.cc){flagEl.style.display="block";flagEl.innerHTML=`<img src="${flagUrl(q.cc)}" alt="Flagge" onerror="this.style.display='none'"/>`;}else{flagEl.style.display="none";flagEl.innerHTML="";}
  $("#ovText").textContent=q?q.q:"(keine Frage)";
  $("#ovAnswer").textContent="Antwort: "+(q?q.a:"—");
  if(revealed)$("#ovAnswer").classList.add("show");else $("#ovAnswer").classList.remove("show");
  const phase=state.buzz.phase,main=turnPlayer();
  const half=Math.floor(val/2),quarter=Math.floor(val/4);
  if(phase==="main"){
    $("#ovPhase").innerHTML=`<span class="main">Hauptrunde</span> · richtig +${val} / falsch −${half}`;
    $("#ovWhoNow").innerHTML=`Antwortet: <b>${main?esc(main.name):"—"}</b>`;
    $("#ovBuzz").innerHTML="";$("#btnOpenBuzz").disabled=false;
    $("#ovHint").textContent="Richtig → Punkte & Frage schliessen. Falsch → Buzzer freigeben, damit andere stehlen können.";
  }else{
    const ord=state.buzz.order.filter(id=>!state.buzz.graded.includes(id));
    const current=ord.length?state.players.find(p=>p.id===ord[0]):null;
    $("#ovPhase").innerHTML=`<span class="steal">Steal-Runde</span> · richtig +${half} / falsch −${quarter}`;
    if(state.buzz.open&&!current){$("#ovWhoNow").innerHTML="";$("#ovBuzz").innerHTML="Buzzer offen, wer zuerst drückt ist dran";}
    else if(current){$("#ovWhoNow").innerHTML=`Am Buzzer: <b>${esc(current.name)}</b>`;$("#ovBuzz").innerHTML=` <span class="who">${esc(current.name)}</span> hat gebuzzert – bewerten!`;}
    else{$("#ovWhoNow").innerHTML="";$("#ovBuzz").innerHTML="Buzzer gesperrt. Freigeben oder Frage schliessen.";}
    $("#btnOpenBuzz").disabled=false;
    $("#ovHint").textContent="Jeder Steal-Spieler bekommt +½ / −¼. Bei falsch buzzert der nächste. Niemand bekommt den vollen Minus-Wert.";
  }
}
$("#btnReveal").onclick=()=>{revealed=!revealed;$("#ovAnswer").classList.toggle("show",revealed);};
$("#btnCorrect").onclick=()=>grade(true);
$("#btnWrong").onclick=()=>grade(false);
$("#btnOpenBuzz").onclick=()=>{
  state.buzz.phase="steal";state.buzz.open=true;
  state.buzz.order=state.buzz.order.filter(id=>!state.buzz.graded.includes(id));
  commit();renderOverlay();toast("Buzzer frei – Spieler können stehlen");
};
$("#btnClose").onclick=()=>closeQuestion();

function grade(correct){
  const val=curVal(),half=Math.floor(val/2),quarter=Math.floor(val/4);
  if(state.buzz.phase==="main"){
    const p=turnPlayer();if(!p){toast("Kein Spieler am Zug.");return;}
    if(correct){p.score+=val;revealed=true;$("#ovAnswer").classList.add("show");toast(`✓ +${val} für ${p.name}`);commit();renderOverlay();}
    else{p.score-=half;toast(`✗ −${half} für ${p.name}. Buzzer frei für Steal.`);state.buzz.phase="steal";state.buzz.open=true;state.buzz.order=[];state.buzz.graded=[];commit();renderOverlay();}
  }else{
    const ord=state.buzz.order.filter(id=>!state.buzz.graded.includes(id));
    const pid=ord[0];if(!pid){toast("Niemand hat gebuzzert.");return;}
    const p=state.players.find(x=>x.id===pid);
    if(correct){p.score+=half;revealed=true;$("#ovAnswer").classList.add("show");toast(`✓ +${half} für ${p.name} (Steal)`);state.buzz.open=false;commit();renderOverlay();}
    else{p.score-=quarter;state.buzz.graded.push(pid);state.buzz.open=true;toast(`✗ −${quarter} für ${p.name}. Nächster darf buzzern.`);commit();renderOverlay();}
  }
}
function closeQuestion(){
  if(!state.open)return;
  state.used[state.open.round][ckey(state.open.cat,state.open.qi)]=true;
  state.open=null;state.buzz={phase:"main",open:false,order:[],graded:[]};revealed=false;
  $("#overlay").classList.remove("open");advanceTurn();commit();
}
$("#nextRoundBtn").onclick=()=>{state.round=state.round==="round1"?"round2":"round1";commit();toast("Runde gewechselt");};

let myId=localStorage.getItem("qd2_myid_"+GAME_ID)||null;
function renderBuzz(){
  const me=state.players.find(p=>p.id===myId);
  if(!me){$("#buzzSetup").style.display="block";$("#buzzPlay").style.display="none";return;}
  $("#buzzSetup").style.display="none";$("#buzzPlay").style.display="flex";
  $("#buzzMyName").textContent=me.name;
  const bq=$("#buzzQuestion");
  if(state.open){
    const rd=QUIZ_CONTENT[state.open.round];const cat=rd.categories.find(c=>c.name===state.open.cat);
    const q=cat?cat.q[state.open.qi]:null;
    bq.style.display="block";
    bq.innerHTML=`<div class="bqcat">${esc(state.open.cat)} · ${rd.values[state.open.qi]}</div>`+
      (q&&q.cc?`<div class="bqflag"><img src="${flagUrl(q.cc)}" alt="Flagge" onerror="this.style.display='none'"/></div>`:"")+`<div>${q?esc(q.q):""}</div>`;
  }else bq.style.display="none";
  const btn=$("#buzzBtn"),info=$("#buzzInfo"),phase=state.buzz.phase;
  if(!state.open){btn.disabled=true;btn.textContent="…";info.textContent="Warte auf eine Frage…";return;}
  if(phase==="main"){
    const main=turnPlayer();
    if(main&&main.id===myId){btn.disabled=true;btn.textContent="DU";info.innerHTML='<b style="color:var(--gold)">Du bist dran – antworte dem Host!</b>';}
    else{btn.disabled=true;btn.textContent="…";info.innerHTML=`<b>${main?esc(main.name):"?"}</b> ist dran.`;}
    return;
  }
  const rank=state.buzz.order.indexOf(myId),graded=state.buzz.graded.includes(myId);
  const ungraded=state.buzz.order.filter(id=>!state.buzz.graded.includes(id));
  if(turnPlayer()&&turnPlayer().id===myId){btn.disabled=true;btn.textContent="—";info.textContent="Stehlen ist für die anderen.";return;}
  if(rank>-1&&!graded&&ungraded[0]===myId){btn.disabled=true;btn.textContent="✓";info.innerHTML='<span class="buzz-first">Du bist dran! </span>';}
  else if(rank>-1&&!graded){btn.disabled=true;btn.textContent=(ungraded.indexOf(myId)+1)+".";info.innerHTML=`<span class="buzz-locked">Warte – Platz ${ungraded.indexOf(myId)+1}</span>`;}
  else if(graded){btn.disabled=true;btn.textContent="✗";info.textContent="Du bist raus bei dieser Frage.";}
  else if(state.buzz.open){btn.disabled=false;btn.textContent="BUZZ";info.innerHTML=' <b style="color:#16a34a">Jetzt buzzern!</b>';}
  else{btn.disabled=true;btn.textContent="…";info.textContent="Buzzer gesperrt.";}
}
function setupBuzz(){
  $("#buzzJoin").onclick=async()=>{
    const name=$("#buzzNameInput").value.trim();if(!name){toast("Bitte Namen eingeben");return;}
    if(usingSupabase){const {data}=await sb.from("quiz_state").select("data").eq("id",GAME_ID).maybeSingle();if(data&&data.data){state=data.data;fixState();}}
    myId=uid();state.players.push({id:myId,name,score:0});if(!state.order.includes(myId))state.order.push(myId);
    localStorage.setItem("qd2_myid_"+GAME_ID,myId);await saveState();renderBuzz();toast("Beigetreten als "+name);
  };
  $("#buzzNameInput").addEventListener("keydown",e=>{if(e.key==="Enter")$("#buzzJoin").click();});
  $("#buzzChange").onclick=()=>{myId=null;localStorage.removeItem("qd2_myid_"+GAME_ID);renderBuzz();};
  $("#buzzBtn").onclick=async()=>{
    if(!myId||!state.open)return;
    if(state.buzz.phase!=="steal"||!state.buzz.open)return;
    if(turnPlayer()&&turnPlayer().id===myId)return;
    if(state.buzz.order.includes(myId))return;
    if(usingSupabase){const {data}=await sb.from("quiz_state").select("data").eq("id",GAME_ID).maybeSingle();if(data&&data.data){state=data.data;fixState();}}
    if(state.buzz.phase==="steal"&&state.buzz.open&&!state.buzz.order.includes(myId)){state.buzz.order.push(myId);await saveState();renderBuzz();}
  };
}

$("#openSettings").onclick=()=>{$("#drawer").classList.add("open");renderEditor();};
$("#closeDrawer").onclick=()=>$("#drawer").classList.remove("open");
function renderEditor(){
  const oe=$("#orderEditor");oe.innerHTML="";
  if(!state.order.length)oe.innerHTML='<div class="sub">Noch keine Spieler beigetreten.</div>';
  state.order.forEach((pid,idx)=>{
    const p=state.players.find(x=>x.id===pid);if(!p)return;
    const row=document.createElement("div");row.className="order-row";
    row.innerHTML=`<span class="nm">${idx+1}. ${esc(p.name)}</span><button data-up>▲</button><button data-down>▼</button><button data-del></button>`;
    row.querySelector("[data-up]").onclick=()=>{if(idx>0){[state.order[idx-1],state.order[idx]]=[state.order[idx],state.order[idx-1]];commit();renderEditor();}};
    row.querySelector("[data-down]").onclick=()=>{if(idx<state.order.length-1){[state.order[idx+1],state.order[idx]]=[state.order[idx],state.order[idx+1]];commit();renderEditor();}};
    row.querySelector("[data-del]").onclick=()=>{state.players=state.players.filter(x=>x.id!==pid);state.order=state.order.filter(x=>x!==pid);if(state.turnIndex>=state.order.length)state.turnIndex=0;commit();renderEditor();};
    oe.appendChild(row);
  });
  $("#roundSelect").value=state.round;
  $("#roundSelect").onchange=()=>{fillCatSelect();renderQEditor();};
  fillCatSelect();renderQEditor();
}
function fillCatSelect(){
  const r=$("#roundSelect").value;
  $("#catSelect").innerHTML=QUIZ_CONTENT[r].categories.map((c,i)=>`<option value="${i}">${esc(c.name)}</option>`).join("");
  $("#catSelect").onchange=renderQEditor;
}
function renderQEditor(){
  const r=$("#roundSelect").value,ci=+$("#catSelect").value||0;
  const cat=QUIZ_CONTENT[r].categories[ci],wrap=$("#questionEditor");wrap.innerHTML="";
  cat.q.forEach((q,qi)=>{
    const val=QUIZ_CONTENT[r].values[qi];
    const box=document.createElement("div");box.className="q-edit";
    box.innerHTML=`<div class="qhead"><span>${val} Punkte</span><span>${state.used[r][ckey(cat.name,qi)]?"✓ gespielt":""}</span></div>
      <label>Frage</label><textarea>${esc(q.q)}</textarea>
      ${q.cc!==undefined?`<label>Ländercode (z.B. ch, de, fr)</label><input class="flag" value="${esc(q.cc)}"/>`:""}
      <label>Antwort</label><input class="ans" value="${esc(q.a)}"/>`;
    box.querySelector("textarea").oninput=e=>{q.q=e.target.value;};
    box.querySelector(".ans").oninput=e=>{q.a=e.target.value;};
    const f=box.querySelector(".flag");if(f)f.oninput=e=>{q.cc=e.target.value;};
    wrap.appendChild(box);
  });
  const note=document.createElement("div");note.className="hint";
  note.textContent="Änderungen hier gelten nur in diesem Browser. Für dauerhafte Änderungen die QUIZ_CONTENT-Daten oben in der Datei bearbeiten.";
  wrap.appendChild(note);
}
$("#resetBoard").onclick=()=>{state.used={round1:{},round2:{}};state.open=null;state.buzz={phase:"main",open:false,order:[],graded:[]};state.turnIndex=0;commit();toast("Board zurückgesetzt");};
$("#resetScores").onclick=()=>{state.players.forEach(p=>p.score=0);commit();toast("Punkte auf 0");};
$("#kickAll").onclick=()=>{if(confirm("Alle Spieler entfernen?")){state.players=[];state.order=[];state.turnIndex=0;commit();renderEditor();}};

async function init(){
  if(!VIEW){$("#gate").style.display="flex";return;}
  $("#gate").style.display="none";
  await loadState();subscribeRealtime();
  if(VIEW==="buzz"){$("#buzzView").style.display="flex";setupBuzz();}
  else $("#boardView").style.display="block";
  renderAll();
  if(usingSupabase){
    setInterval(async()=>{
      const {data}=await sb.from("quiz_state").select("data").eq("id",GAME_ID).maybeSingle();
      if(data&&data.data){const s=JSON.stringify(data.data);if(s!==JSON.stringify(state)){state=data.data;fixState();renderAll();}}
    },3500);
  }
}
init();
</script>
</body>
